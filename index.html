<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE Talk - お持ち帰り版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            line: {
              brand: '#06C755',
              brandHover: '#05B04B',
              bg: '#8CABD9',
              bgDark: '#1A202C',
              bubbleMe: '#8FE25F',
              bubbleMeDark: '#2D8A4E',
              bubbleOther: '#FFFFFF',
              bubbleOtherDark: '#2D3748'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* LINE風 吹き出しのしっぽ */
    .bubble-me-tail {
      position: relative;
    }
    .bubble-me-tail::after {
      content: '';
      position: absolute;
      top: 10px;
      right: -6px;
      width: 10px;
      height: 10px;
      background-color: #8FE25F;
      transform: rotate(45deg);
      border-top-right-radius: 2px;
      z-index: 0;
    }
    .dark .bubble-me-tail::after {
      background-color: #2D8A4E;
    }
    .bubble-other-tail {
      position: relative;
    }
    .bubble-other-tail::after {
      content: '';
      position: absolute;
      top: 10px;
      left: -6px;
      width: 10px;
      height: 10px;
      background-color: #FFFFFF;
      transform: rotate(45deg);
      border-bottom-left-radius: 2px;
      z-index: 0;
    }
    .dark .bubble-other-tail::after {
      background-color: #2D3748;
    }
    /* スクロールバー非表示 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* トークエリアのスクロール */
    #messagesContainer::-webkit-scrollbar {
      width: 6px;
    }
    #messagesContainer::-webkit-scrollbar-track {
      background: transparent;
    }
    #messagesContainer::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-line-bg dark:bg-line-bgDark text-zinc-900 dark:text-zinc-100 font-sans min-h-screen flex flex-col transition-colors duration-200">
  
  <!-- 1. HEADER (LINE Talk トークヘッダー) -->
  <header class="bg-[#1E2A3A]/90 dark:bg-zinc-950/95 backdrop-blur text-white px-4 py-3 sticky top-0 z-20 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <button id="backBtn" class="p-1 hover:bg-white/10 rounded-full transition-colors hidden" title="設定に戻る">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <div>
        <div class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse" id="connectionDot"></span>
          <h1 class="font-bold text-base tracking-wide" id="headerTitle">LINE Talk</h1>
        </div>
        <div class="flex flex-col sm:flex-row sm:items-center gap-2 mt-0.5">
          <p class="text-[10px] text-zinc-300 font-medium">部屋ID: <span id="headerRoomId" class="font-mono font-bold bg-white/10 px-1 py-0.5 rounded">---</span> <span id="onlineCount" class="ml-1 opacity-90"></span></p>
          
          <!-- クイック別室入室/移動フォーム -->
          <div id="quickRoomArea" class="hidden flex items-center gap-1 bg-white/10 px-1.5 py-0.5 rounded border border-white/10 text-[9px]">
            <span class="text-zinc-300">🚪 別の部屋へ:</span>
            <input type="text" id="quickRoomInput" class="bg-transparent focus:outline-none font-bold text-white placeholder-zinc-400 w-16" placeholder="ID入力">
            <button id="quickRoomGoBtn" class="bg-line-brand text-white font-extrabold px-1 rounded hover:bg-line-brandHover transition-all">Go</button>
          </div>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeToggleBtn" class="p-2 hover:bg-white/10 rounded-xl transition-all text-sm" title="テーマ変更">
        🌓
      </button>
    </div>
  </header>

  <!-- 2. LOGIN / SETUP VIEW -->
  <main id="setupView" class="flex-1 flex flex-col justify-center items-center p-4">
    <div class="bg-white dark:bg-zinc-900 border border-zinc-200/50 dark:border-zinc-800/50 rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl text-center space-y-6">
      
      <div class="flex flex-col items-center">
        <div class="w-16 h-16 bg-line-brand text-white font-extrabold rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-emerald-100 dark:shadow-none">
          💬
        </div>
        <h2 class="text-xl font-extrabold mt-4 text-zinc-800 dark:text-zinc-100">LINE Talk お持ち帰り版</h2>
        <p class="text-[11px] text-zinc-400 mt-1 max-w-xs leading-relaxed">このHTMLファイルを起動するだけで、現在進行中のトークルームに直接安全にアクセスできます。</p>
      </div>

      <!-- アバター選択 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">プロフィール画像</label>
        <div class="grid grid-cols-6 gap-2" id="avatarGrid"></div>
      </div>

      <!-- 部屋ID入力 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">トークルームID (部屋を決める・打ち込む)</label>
        <input type="text" id="roomInput" class="w-full py-3 px-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:ring-2 focus:ring-line-brand/50 focus:border-line-brand focus:outline-none font-bold text-sm text-zinc-800 dark:text-zinc-100" placeholder="任意の部屋IDを入力" value="123456">
        <p class="text-[10px] text-zinc-400 leading-normal">※友達と同じ部屋IDを入力して「トークを開始する」を押してください。</p>
      </div>

      <!-- ニックネーム入力 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">表示するお名前</label>
        <input type="text" id="nicknameInput" maxlength="15" class="w-full py-3 px-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:ring-2 focus:ring-line-brand/50 focus:border-line-brand focus:outline-none font-bold text-sm text-zinc-800 dark:text-zinc-100" placeholder="ニックネームを入力">
      </div>

      <!-- 参加ボタン -->
      <button id="joinBtn" class="w-full py-3.5 bg-line-brand hover:bg-line-brandHover text-white font-bold rounded-xl active:scale-[0.98] transition-all text-sm shadow-md shadow-emerald-100 dark:shadow-none">
        トークを開始する
      </button>
    </div>
  </main>

  <!-- 3. CHAT VIEW -->
  <main id="chatView" class="hidden flex-1 flex flex-col overflow-hidden max-w-2xl w-full mx-auto relative">
    
    <div id="dropOverlay" class="absolute inset-0 bg-line-brand/20 dark:bg-line-brand/10 backdrop-blur-sm border-4 border-dashed border-line-brand m-2 rounded-2xl z-50 flex flex-col items-center justify-center pointer-events-none hidden opacity-0 transition-opacity duration-200">
      <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-xl flex flex-col items-center gap-3">
        <span class="text-4xl animate-bounce">📁</span>
        <p class="font-extrabold text-zinc-800 dark:text-zinc-100 text-sm">ここにファイルをドロップして送信</p>
      </div>
    </div>

    <!-- トークメッセージリスト -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-4 min-h-0"></div>

    <!-- 送信中 -->
    <div id="uploadingIndicator" class="px-4 py-2 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-sm border-t border-zinc-100 dark:border-zinc-800 flex items-center gap-2 text-xs text-zinc-500 hidden">
      <div class="w-3.5 h-3.5 border-2 border-line-brand border-t-transparent rounded-full animate-spin"></div>
      <span>ファイルをアップロード中...</span>
    </div>

    <!-- 入力エリア -->
    <footer class="bg-white dark:bg-zinc-950 border-t border-zinc-200 dark:border-zinc-900 p-2 md:p-3 flex items-end gap-2 sticky bottom-0 z-10">
      
      <!-- スタンプ選択パネル -->
      <div id="stickerPicker" class="absolute bottom-full mb-2 left-2 z-50 w-72 p-3 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-xl transition-all hidden scale-95 opacity-0 origin-bottom-left">
        <div class="flex justify-between items-center mb-2 pb-1.5 border-b border-zinc-100 dark:border-zinc-800">
          <span class="text-xs font-extrabold text-zinc-700 dark:text-zinc-300">LINEスタンプ風絵絵文字</span>
          <button type="button" id="closeStickerBtn" class="p-1 rounded-full text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-zinc-800">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
        <div class="grid grid-cols-5 gap-2 max-h-48 overflow-y-auto pr-1" id="stickerGrid"></div>
      </div>

      <button id="fileBtn" class="p-2.5 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 hover:text-line-brand transition-colors flex-shrink-0" title="画像・ファイルを送信">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      </button>
      <input type="file" id="fileInput" class="hidden" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">

      <button id="stickerBtn" class="p-2.5 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 hover:text-line-brand transition-colors flex-shrink-0" title="スタンプを送信">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </button>

      <div class="flex-1 bg-zinc-100 dark:bg-zinc-900 rounded-2xl px-3 py-2 border border-zinc-200/50 dark:border-zinc-800/50 focus-within:ring-2 focus-within:ring-line-brand/30 transition-shadow">
        <textarea id="messageInput" rows="1" class="w-full bg-transparent text-sm focus:outline-none resize-none max-h-24 text-zinc-800 dark:text-zinc-100 placeholder-zinc-400 leading-normal" placeholder="メッセージを入力..."></textarea>
      </div>

      <button id="sendBtn" class="p-2.5 bg-line-brand hover:bg-line-brandHover text-white rounded-xl active:scale-95 transition-all flex items-center justify-center shadow-sm flex-shrink-0" title="送信">
        <svg class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
      </button>
    </footer>
  </main>

  <script>
    let ROOM_ID = "123456";
    // 確実に現在オンラインで稼働中の開発サーバーを指定
    const WS_SERVER = "wss://ais-dev-zgjvqvivh4qdpuw4v2hl7b-947807142449.asia-east1.run.app";
    let ws = null;
    let myName = "";
    let myId = "";
    let activeUsersCount = 1;
    let selectedAvatar = "🐻";
    
    const avatars = ["🐻", "🐰", "🐥", "🐸", "🐱", "🐼", "🦁", "🐵", "🦊", "🐨", "🐧", "🦄"];

    const setupView = document.getElementById("setupView");
    const chatView = document.getElementById("chatView");
    const nicknameInput = document.getElementById("nicknameInput");
    const joinBtn = document.getElementById("joinBtn");
    const backBtn = document.getElementById("backBtn");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const messagesContainer = document.getElementById("messagesContainer");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const connectionDot = document.getElementById("connectionDot");
    const headerTitle = document.getElementById("headerTitle");
    const onlineCount = document.getElementById("onlineCount");
    const avatarGrid = document.getElementById("avatarGrid");
    
    const fileBtn = document.getElementById("fileBtn");
    const fileInput = document.getElementById("fileInput");
    const uploadingIndicator = document.getElementById("uploadingIndicator");
    const dropOverlay = document.getElementById("dropOverlay");
    
    const stickerBtn = document.getElementById("stickerBtn");
    const stickerPicker = document.getElementById("stickerPicker");
    const closeStickerBtn = document.getElementById("closeStickerBtn");
    const stickerGrid = document.getElementById("stickerGrid");

    const savedName = localStorage.getItem("line_saved_name") || "";
    const savedAvatar = localStorage.getItem("line_saved_avatar") || "🐻";
    if (savedName) nicknameInput.value = savedName;
    selectedAvatar = savedAvatar;

    function renderAvatarGrid() {
      avatarGrid.innerHTML = "";
      avatars.forEach(av => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "aspect-square text-2xl flex items-center justify-center bg-zinc-50 dark:bg-zinc-800 hover:bg-zinc-100 border-2 rounded-xl transition-all " + 
          (av === selectedAvatar ? "border-line-brand bg-emerald-50/50 dark:bg-emerald-950/20 scale-105" : "border-transparent");
        btn.innerText = av;
        btn.addEventListener("click", () => {
          selectedAvatar = av;
          renderAvatarGrid();
        });
        avatarGrid.appendChild(btn);
      });
    }
    renderAvatarGrid();

    const STICKERS_LIST = [
      { id: "bear_ok", emoji: "🐻", label: "OK!" },
      { id: "bunny_love", emoji: "🐰", label: "ありがとう" },
      { id: "chick_congrats", emoji: "🐥", label: "おめでとう" },
      { id: "cat_angry", emoji: "🐱", label: "おこ！" },
      { id: "panda_cry", emoji: "🐼", label: "えーん" },
      { id: "frog_shock", emoji: "🐸", label: "ガーン！" },
      { id: "koala_sleep", emoji: "🐨", label: "おやすみ" },
      { id: "lion_gogogo", emoji: "🦁", label: "ファイト！" },
      { id: "monkey_sorry", emoji: "🐵", label: "ごめんね" },
      { id: "fox_sparkle", emoji: "🦊", label: "お疲れさま" }
    ];

    function renderStickerGrid() {
      stickerGrid.innerHTML = "";
      STICKERS_LIST.forEach(st => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "flex flex-col items-center justify-center p-2 rounded-xl border border-transparent hover:border-zinc-200 dark:hover:border-zinc-700 hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-all active:scale-95";
        btn.title = st.label;
        btn.innerHTML = '<span class="text-3xl leading-none mb-1 select-none">' + st.emoji + '</span><span class="text-[8px] font-bold text-zinc-500 dark:text-zinc-400 truncate w-full text-center leading-none">' + st.label + '</span>';
        btn.addEventListener("click", () => {
          sendSticker(st.id);
        });
        stickerGrid.appendChild(btn);
      });
    }
    renderStickerGrid();

    stickerBtn.addEventListener("click", () => {
      const isHidden = stickerPicker.classList.contains("hidden");
      if (isHidden) {
        stickerPicker.classList.remove("hidden");
        setTimeout(() => {
          stickerPicker.classList.remove("scale-95", "opacity-0");
        }, 10);
      } else {
        hideStickerPicker();
      }
    });

    closeStickerBtn.addEventListener("click", hideStickerPicker);

    function hideStickerPicker() {
      stickerPicker.classList.add("scale-95", "opacity-0");
      setTimeout(() => {
        stickerPicker.classList.add("hidden");
      }, 200);
    }

    function sendSticker(stickerId) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({
        type: "message",
        stickerId: stickerId
      }));
      hideStickerPicker();
    }

    const isDarkSaved = localStorage.getItem("line_dark_theme") === "true";
    if (isDarkSaved) {
      document.documentElement.classList.add("dark");
    }

    themeToggleBtn.addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
      localStorage.setItem("line_dark_theme", document.documentElement.classList.contains("dark"));
    });

    joinBtn.addEventListener("click", () => {
      const roomInputVal = document.getElementById("roomInput").value.trim().replace(/\s+/g, "");
      if (!roomInputVal) {
        alert("部屋IDを入力してください。");
        return;
      }
      ROOM_ID = roomInputVal;

      myName = nicknameInput.value.trim();
      if (!myName) {
        alert("お名前（ニックネーム）を入力してください。");
        return;
      }
      localStorage.setItem("line_saved_name", myName);
      localStorage.setItem("line_saved_avatar", selectedAvatar);

      const headerRoomId = document.getElementById("headerRoomId");
      if (headerRoomId) {
        headerRoomId.innerText = ROOM_ID;
      }

      connectWebSocket();
    });

    backBtn.addEventListener("click", () => {
      if (ws) {
        ws.close();
      }
      chatView.classList.add("hidden");
      backBtn.classList.add("hidden");
      const quickRoomArea = document.getElementById("quickRoomArea");
      if (quickRoomArea) {
        quickRoomArea.classList.add("hidden");
      }
      setupView.classList.remove("hidden");
      headerTitle.innerText = "LINE Talk";
      onlineCount.innerText = "";
    });

    const quickRoomArea = document.getElementById("quickRoomArea");
    const quickRoomInput = document.getElementById("quickRoomInput");
    const quickRoomGoBtn = document.getElementById("quickRoomGoBtn");

    if (quickRoomGoBtn && quickRoomInput) {
      quickRoomGoBtn.addEventListener("click", () => {
        const val = quickRoomInput.value.trim().replace(/\s+/g, "");
        if (!val) {
          alert("移動先の部屋IDを入力してください。");
          return;
        }
        ROOM_ID = val;
        
        const headerRoomId = document.getElementById("headerRoomId");
        if (headerRoomId) {
          headerRoomId.innerText = ROOM_ID;
        }
        
        const roomInput = document.getElementById("roomInput");
        if (roomInput) {
          roomInput.value = ROOM_ID;
        }

        quickRoomInput.value = "";
        
        if (ws) {
          ws.close();
        }
        connectWebSocket();
      });

      quickRoomInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          quickRoomGoBtn.click();
        }
      });
    }

    messageInput.addEventListener("input", function() {
      this.style.height = "auto";
      this.style.height = (this.scrollHeight) + "px";
    });

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !ws) return;

      ws.send(JSON.stringify({
        type: "message",
        text: text
      }));
      messageInput.value = "";
      messageInput.style.height = "auto";
    }

    fileBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      if (e.target.files && e.target.files[0]) {
        uploadFile(e.target.files[0]);
      }
    });

    function uploadFile(file) {
      if (!ws) return;
      uploadingIndicator.classList.remove("hidden");
      const reader = new FileReader();
      
      let fileType = "file";
      if (file.type.startsWith("image/")) fileType = "image";
      else if (file.type.startsWith("video/")) fileType = "video";

      reader.onload = (e) => {
        ws.send(JSON.stringify({
          type: "message",
          text: "",
          fileData: e.target.result,
          fileName: file.name,
          fileType: fileType
        }));
        uploadingIndicator.classList.add("hidden");
        fileInput.value = "";
      };
      reader.onerror = () => {
        alert("ファイルの読み込みに失敗しました。");
        uploadingIndicator.classList.add("hidden");
      };
      reader.readAsDataURL(file);
    }

    window.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropOverlay.classList.remove("hidden");
      setTimeout(() => dropOverlay.classList.remove("opacity-0"), 10);
    });

    window.addEventListener("dragleave", (e) => {
      e.preventDefault();
      if (e.relatedTarget === null) {
        dropOverlay.classList.add("opacity-0");
        setTimeout(() => dropOverlay.classList.add("hidden"), 200);
      }
    });

    window.addEventListener("drop", (e) => {
      e.preventDefault();
      dropOverlay.classList.add("opacity-0");
      setTimeout(() => dropOverlay.classList.add("hidden"), 200);

      if (e.dataTransfer.files && e.dataTransfer.files[0]) {
        uploadFile(e.dataTransfer.files[0]);
      }
    });

    function resetJoinButton() {
      joinBtn.disabled = false;
      joinBtn.innerText = "トークを開始する";
    }

    function connectWebSocket() {
      connectionDot.classList.remove("bg-emerald-500", "bg-rose-500");
      connectionDot.classList.add("bg-amber-500");
      
      joinBtn.disabled = true;
      joinBtn.innerText = "接続中...";
      
      let connectTimeout = setTimeout(() => {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          alert("接続がタイムアウトしました。もう一度お試しください。");
          resetJoinButton();
          if (ws) ws.close();
        }
      }, 10000);

      ws = new WebSocket(WS_SERVER);

      ws.onopen = () => {
        clearTimeout(connectTimeout);
        connectionDot.classList.remove("bg-amber-500");
        connectionDot.classList.add("bg-emerald-500");
        
        ws.send(JSON.stringify({
          type: "join",
          roomId: ROOM_ID,
          userName: myName,
          avatar: selectedAvatar
         }));
        
        setupView.classList.add("hidden");
        chatView.classList.remove("hidden");
        backBtn.classList.remove("hidden");
        const quickRoomArea = document.getElementById("quickRoomArea");
        if (quickRoomArea) {
          quickRoomArea.classList.remove("hidden");
        }
        headerTitle.innerText = "トークルーム";
        resetJoinButton();
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          
          if (data.type === "init") {
            myId = data.userId;
            messagesContainer.innerHTML = "";
            activeUsersCount = data.users.length;
            updateUserCount(activeUsersCount);
            data.messages.forEach(msg => {
              appendMessage(msg);
            });
            sendReadReceipts(data.messages);
          } else if (data.type === "message") {
            appendMessage(data.message);
            if (data.message.senderId !== myId) {
              sendReadReceipts([data.message]);
            }
          } else if (data.type === "user_joined") {
            appendSystemMessage("📢 " + data.user.avatar + " " + data.user.userName + "さんが参加しました");
            activeUsersCount++;
            updateUserCount(activeUsersCount);
          } else if (data.type === "user_left") {
            appendSystemMessage("📢 ユーザーが退室しました");
            if (activeUsersCount > 1) activeUsersCount--;
            updateUserCount(activeUsersCount);
          } else if (data.type === "read_update") {
            const { messageIds, userId } = data;
            messageIds.forEach(id => {
              const msgEl = document.getElementById("msg_" + id);
              if (msgEl) {
                let readBy = JSON.parse(msgEl.getAttribute("data-read-by") || "[]");
                if (!readBy.includes(userId)) {
                  readBy.push(userId);
                  msgEl.setAttribute("data-read-by", JSON.stringify(readBy));
                  const countLabel = msgEl.querySelector(".read-count-label");
                  if (countLabel) {
                    const readCount = readBy.filter(uId => uId !== msgEl.getAttribute("data-sender-id")).length;
                    if (readCount > 0) {
                      countLabel.innerText = "既読" + (activeUsersCount > 2 ? (" " + readCount) : "");
                      countLabel.classList.remove("hidden");
                    }
                  }
                }
              }
            });
          }
        } catch(e) {
          console.error(e);
        }
      };

      ws.onerror = (err) => {
        clearTimeout(connectTimeout);
        console.error("WebSocket Error:", err);
        alert("サーバーに接続できませんでした。アプリをデプロイ直後かスリープ中の場合、最初の起動に30秒程度かかることがあります。少し待ってから再度お試しください。");
        resetJoinButton();
      };

      ws.onclose = () => {
        clearTimeout(connectTimeout);
        connectionDot.classList.remove("bg-emerald-500", "bg-amber-500");
        connectionDot.classList.add("bg-rose-500");
        appendSystemMessage("⚠️ 接続が切れました。再接続をお試しください。");
        resetJoinButton();
      };
    }

    function sendReadReceipts(msgs) {
      if (!ws || ws.readyState !== WebSocket.OPEN || !myId) return;
      const unreadIds = msgs
        .filter(m => m.senderId !== "system" && m.senderId !== myId && (!m.readBy || !m.readBy.includes(myId)))
        .map(m => m.id);
      
      if (unreadIds.length > 0) {
        ws.send(JSON.stringify({
          type: "read",
          messageIds: unreadIds
        }));
      }
    }

    function updateUserCount(count) {
      onlineCount.innerText = " (メンバー: " + count + "人)";
    }

    function appendSystemMessage(text) {
      const div = document.createElement("div");
      div.className = "flex justify-center my-2";
      div.innerHTML = '<span class="bg-black/10 dark:bg-black/30 text-white dark:text-zinc-300 text-[11px] px-3 py-1 rounded-full font-medium select-none shadow-sm">' + text + '</span>';
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function appendMessage(msg) {
      const isMe = msg.senderId === myId;
      
      const messageWrapper = document.createElement("div");
      messageWrapper.id = "msg_" + msg.id;
      messageWrapper.setAttribute("data-sender-id", msg.senderId);
      messageWrapper.setAttribute("data-read-by", JSON.stringify(msg.readBy || []));
      
      messageWrapper.className = "flex w-full items-start gap-2 " + (isMe ? "justify-end" : "justify-start");
      
      // アバター (相手のみ表示)
      let avatarHtml = "";
      if (!isMe) {
        avatarHtml = '<span class="w-8 h-8 flex items-center justify-center text-xl bg-zinc-200/80 dark:bg-zinc-800 rounded-xl select-none flex-shrink-0 shadow-sm">' + (msg.senderAvatar || "👤") + '</span>';
      }
      
      // 名前 & 本文
      let contentHtml = "";
      const timeStr = new Date(msg.timestamp).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
      
      const isSticker = !!msg.stickerId;
      let bubbleBody = "";
      
      if (isSticker) {
        const found = STICKERS_LIST.find(s => s.id === msg.stickerId);
        const emoji = found ? found.emoji : "🐻";
        bubbleBody = '<span class="text-6xl select-none block py-1 animate-in fade-in zoom-in duration-200">' + emoji + '</span>';
      } else if (msg.fileData) {
        if (msg.fileType === "image") {
          bubbleBody = '<img src="' + msg.fileData + '" class="max-w-xs md:max-w-sm rounded-xl border border-black/5 dark:border-white/5 shadow-sm max-h-72 object-cover cursor-pointer hover:brightness-95 active:scale-98 transition-all" onclick="window.open(this.src)" />';
        } else if (msg.fileType === "video") {
          bubbleBody = '<video src="' + msg.fileData + '" controls class="max-w-xs md:max-w-sm rounded-xl border border-black/5 dark:border-white/5 shadow-sm max-h-72 object-cover" />';
        } else {
          bubbleBody = '<a href="' + msg.fileData + '" download="' + msg.fileName + '" class="flex items-center gap-2 text-indigo-600 dark:text-indigo-400 font-bold hover:underline py-1.5"><svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg><span class="truncate max-w-[160px] text-xs">' + msg.fileName + '</span></a>';
        }
      } else {
        bubbleBody = '<p class="text-sm font-medium leading-relaxed break-words whitespace-pre-wrap select-text">' + msg.text + '</p>';
      }
      
      // 既読表示
      const readCount = (msg.readBy || []).filter(uId => uId !== msg.senderId).length;
      const readStatusClass = (readCount > 0) ? "" : "hidden";
      const readLabel = "既読" + (activeUsersCount > 2 ? (" " + readCount) : "");

      if (isMe) {
        contentHtml = '<div class="flex items-end gap-1.5 max-w-[70%]">' +
          '<div class="flex flex-col items-end text-[9px] text-zinc-500/85 dark:text-zinc-400/80 font-bold select-none whitespace-nowrap min-w-[32px]">' +
            '<span class="read-count-label text-line-brand dark:text-emerald-400 ' + readStatusClass + '">' + readLabel + '</span>' +
            '<span>' + timeStr + '</span>' +
          '</div>' +
          '<div class="bg-line-bubbleMe dark:bg-line-bubbleMeDark text-zinc-900 dark:text-zinc-100 rounded-2xl px-3.5 py-2.5 shadow-sm border border-emerald-300/10 bubble-me-tail z-10">' +
            bubbleBody +
          '</div>' +
        '</div>';
      } else {
        contentHtml = '<div class="flex flex-col max-w-[70%]">' +
          '<span class="text-[10px] text-zinc-500 dark:text-zinc-400 font-bold ml-1 mb-1 select-none">' + msg.senderName + '</span>' +
          '<div class="flex items-end gap-1.5">' +
            '<div class="bg-line-bubbleOther dark:bg-line-bubbleOtherDark text-zinc-800 dark:text-zinc-100 rounded-2xl px-3.5 py-2.5 shadow-sm border border-zinc-200/50 dark:border-zinc-800/50 bubble-other-tail z-10">' +
              bubbleBody +
            '</div>' +
            '<span class="text-[9px] text-zinc-500/85 dark:text-zinc-400/80 font-bold select-none whitespace-nowrap">' + timeStr + '</span>' +
          '</div>' +
        '</div>';
      }
      
      messageWrapper.innerHTML = avatarHtml + contentHtml;
      messagesContainer.appendChild(messageWrapper);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
  </script>
</body>
</html>
