<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE Talk - 部屋: 123456</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            line: {
              brand: '#06C755',
              brandHover: '#05B04B',
              bg: '#8CABD9',
              bgDark: '#1A202C',
              bubbleMe: '#8FE25F',
              bubbleMeDark: '#2D8A4E',
              bubbleOther: '#FFFFFF',
              bubbleOtherDark: '#2D3748'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* LINE風 吹き出しのしっぽ */
    .bubble-me-tail {
      position: relative;
    }
    .bubble-me-tail::after {
      content: '';
      position: absolute;
      top: 10px;
      right: -6px;
      width: 10px;
      height: 10px;
      background-color: #8FE25F;
      transform: rotate(45deg);
      border-top-right-radius: 2px;
      z-index: 0;
    }
    .dark .bubble-me-tail::after {
      background-color: #2D8A4E;
    }
    .bubble-other-tail {
      position: relative;
    }
    .bubble-other-tail::after {
      content: '';
      position: absolute;
      top: 10px;
      left: -6px;
      width: 10px;
      height: 10px;
      background-color: #FFFFFF;
      transform: rotate(45deg);
      border-bottom-left-radius: 2px;
      z-index: 0;
    }
    .dark .bubble-other-tail::after {
      background-color: #2D3748;
    }
    /* スクロールバー非表示 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* トークエリアのスクロール */
    #messagesContainer::-webkit-scrollbar {
      width: 6px;
    }
    #messagesContainer::-webkit-scrollbar-track {
      background: transparent;
    }
    #messagesContainer::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-line-bg dark:bg-line-bgDark text-zinc-900 dark:text-zinc-100 font-sans min-h-screen flex flex-col transition-colors duration-200">
  
  <!-- 1. HEADER (LINE Talk トークヘッダー) -->
  <header class="bg-[#1E2A3A]/90 dark:bg-zinc-950/95 backdrop-blur text-white px-4 py-3 sticky top-0 z-20 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <button id="backBtn" class="p-1 hover:bg-white/10 rounded-full transition-colors hidden" title="設定に戻る">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <div>
        <div class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse" id="connectionDot"></span>
          <h1 class="font-bold text-base tracking-wide" id="headerTitle">LINE Talk</h1>
        </div>
        <div class="flex flex-col sm:flex-row sm:items-center gap-2 mt-0.5">
          <p class="text-[10px] text-zinc-300 font-medium">部屋ID: <span id="headerRoomId" class="font-mono font-bold bg-white/10 px-1 py-0.5 rounded">123456</span> <span id="onlineCount" class="ml-1 opacity-90"></span></p>
          
          <!-- クイック別室入室/移動フォーム (お持ち帰り用) -->
          <div id="quickRoomArea" class="hidden flex items-center gap-1 bg-white/10 px-1.5 py-0.5 rounded border border-white/10 text-[9px]">
            <span class="text-zinc-300">🚪 別の部屋へ:</span>
            <input type="text" id="quickRoomInput" class="bg-transparent focus:outline-none font-bold text-white placeholder-zinc-400 w-16 text-center border-b border-white/20" placeholder="ID入力">
            <button id="quickRoomGoBtn" class="bg-line-brand text-white font-extrabold px-1 rounded hover:bg-line-brandHover transition-all">Go</button>
          </div>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeToggleBtn" class="p-2 hover:bg-white/10 rounded-xl transition-all text-sm" title="テーマ変更">
        🌓
      </button>
    </div>
  </header>

  <!-- 2. LOGIN / SETUP VIEW -->
  <main id="setupView" class="flex-1 flex flex-col justify-center items-center p-4">
    <div class="bg-white dark:bg-zinc-900 border border-zinc-200/50 dark:border-zinc-800/50 rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl text-center space-y-6">
      
      <!-- LINE公式風吹き出しロゴ -->
      <div class="flex flex-col items-center">
        <div class="w-16 h-16 bg-line-brand text-white font-extrabold rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-emerald-100 dark:shadow-none">
          💬
        </div>
        <h2 class="text-xl font-extrabold mt-4 text-zinc-800 dark:text-zinc-100">LINE Talk お持ち帰り版</h2>
        <p class="text-[11px] text-zinc-400 mt-1 max-w-xs leading-relaxed">このHTMLファイルだけで、どこからでもトークルームに安全に直接接続して会話できます。</p>
      </div>

      <!-- アバター選択 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">プロフィール画像 (LINEキャラクター風)</label>
        <div class="grid grid-cols-6 gap-2" id="avatarGrid">
          <!-- JSでレンダリング -->
        </div>
      </div>

      <!-- 部屋ID入力 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">🚪 トークルームID (部屋を決める)</label>
        <input type="text" id="roomInput" class="w-full py-3 px-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:ring-2 focus:ring-line-brand/50 focus:border-line-brand focus:outline-none font-bold text-sm text-zinc-800 dark:text-zinc-100" placeholder="任意の部屋ID（例: room123）を入力" value="123456">
        <p class="text-[10px] text-zinc-400 leading-normal">※友達と同じ部屋IDを打ち込むことで一緒に会話できます。</p>
      </div>

      <!-- ニックネーム入力 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">👤 表示するお名前</label>
        <input type="text" id="nicknameInput" maxlength="15" class="w-full py-3 px-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:ring-2 focus:ring-line-brand/50 focus:border-line-brand focus:outline-none font-bold text-sm text-zinc-800 dark:text-zinc-100" placeholder="ニックネームを入力してください">
      </div>

      <!-- 参加ボタン -->
      <button id="joinBtn" class="w-full py-3.5 px-6 bg-line-brand hover:bg-line-brandHover active:scale-95 text-white font-extrabold rounded-2xl shadow-lg shadow-emerald-100 dark:shadow-none transition-all tracking-wide text-sm flex items-center justify-center gap-2">
        <span>トークルームに入る</span>
        <span>👉</span>
      </button>
    </div>
  </main>

  <!-- 3. MAIN CHAT VIEW -->
  <main id="chatView" class="flex-1 max-w-4xl w-full mx-auto flex flex-col hidden overflow-hidden relative">
    
    <!-- ドラッグ＆ドロップ用オーバーレイ -->
    <div id="dropOverlay" class="absolute inset-0 bg-line-brand/20 dark:bg-line-brand/10 backdrop-blur-sm border-4 border-dashed border-line-brand z-50 flex flex-col items-center justify-center transition-all opacity-0 pointer-events-none">
      <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-xl flex flex-col items-center">
        <span class="text-5xl animate-bounce">📁</span>
        <p class="mt-2 text-sm font-bold text-zinc-700 dark:text-zinc-200">ここにドロップして画像を送信</p>
      </div>
    </div>

    <!-- メッセージ表示エリア -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
      <!-- メッセージはJSで動的に挿入されます -->
    </div>

    <!-- アップロード中のインジケータ -->
    <div id="uploadingIndicator" class="hidden px-4 py-2 bg-yellow-50 dark:bg-yellow-950/40 border-t border-yellow-100 dark:border-yellow-900/40 text-xs font-bold text-yellow-600 dark:text-yellow-400 flex items-center gap-2 animate-pulse">
      <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
      画像を送信中...
    </div>

    <!-- スタンプピッカー（フローティング） -->
    <div id="stickerPicker" class="absolute bottom-20 left-4 right-4 bg-white/95 dark:bg-zinc-900/95 backdrop-blur border border-zinc-200 dark:border-zinc-800 rounded-3xl p-4 shadow-2xl z-40 hidden transform scale-95 opacity-0 transition-all duration-200">
      <div class="flex items-center justify-between mb-3">
        <h4 class="text-xs font-extrabold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider flex items-center gap-1.5">
          <span>🐻</span> スタンプを選択
        </h4>
        <button id="closeStickerBtn" class="text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 text-sm font-bold p-1">✕</button>
      </div>
      <div class="grid grid-cols-5 gap-2 max-h-48 overflow-y-auto" id="stickerGrid">
        <!-- JSでスタンプ挿入 -->
      </div>
    </div>

    <!-- 下部メッセージ入力欄 -->
    <footer class="bg-white dark:bg-zinc-950 border-t border-zinc-200/80 dark:border-zinc-800/80 px-4 py-3 flex items-end gap-2 sticky bottom-0 z-30">
      
      <!-- ファイル添付ボタン -->
      <button id="fileBtn" class="p-2.5 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 hover:text-line-brand transition-colors flex-shrink-0" title="画像・ファイルを送信">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      </button>
      <input type="file" id="fileInput" class="hidden" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">

      <!-- スタンプボタン -->
      <button id="stickerBtn" class="p-2.5 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 hover:text-line-brand transition-colors flex-shrink-0" title="スタンプを送信">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </button>

      <!-- テキスト入力 -->
      <div class="flex-1 bg-zinc-100 dark:bg-zinc-900 rounded-2xl px-3 py-2 border border-zinc-200/50 dark:border-zinc-800/50 focus-within:ring-2 focus-within:ring-line-brand/30 transition-shadow">
        <textarea id="messageInput" rows="1" class="w-full bg-transparent text-sm focus:outline-none resize-none max-h-24 text-zinc-800 dark:text-zinc-100 placeholder-zinc-400 leading-normal" placeholder="メッセージを入力..."></textarea>
      </div>

      <!-- 送信ボタン -->
      <button id="sendBtn" class="p-2.5 bg-line-brand hover:bg-line-brandHover text-white rounded-xl active:scale-95 transition-all flex items-center justify-center shadow-sm flex-shrink-0" title="送信">
        <svg class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
      </button>
    </footer>
  </main>

  <script>
    let ROOM_ID = "123456";
    const WS_SERVER = "wss://ais-pre-zgjvqvivh4qdpuw4v2hl7b-947807142449.asia-east1.run.app";
    let ws = null;
    let myName = "";
    let selectedAvatar = "🐻";

    const AVATARS = ["🐻", "🐰", "🐥", "🐱", "🐼", "🐸", "🐨", "🦁", "🐵", "🦊", "🐷", "🐹"];

    // UI要素
    const setupView = document.getElementById("setupView");
    const chatView = document.getElementById("chatView");
    const backBtn = document.getElementById("backBtn");
    const joinBtn = document.getElementById("joinBtn");
    const nicknameInput = document.getElementById("nicknameInput");
    const avatarGrid = document.getElementById("avatarGrid");
    const messagesContainer = document.getElementById("messagesContainer");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const connectionDot = document.getElementById("connectionDot");
    const headerTitle = document.getElementById("headerTitle");
    const headerRoomId = document.getElementById("headerRoomId");
    const onlineCount = document.getElementById("onlineCount");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const fileBtn = document.getElementById("fileBtn");
    const fileInput = document.getElementById("fileInput");
    const uploadingIndicator = document.getElementById("uploadingIndicator");
    const dropOverlay = document.getElementById("dropOverlay");
    
    const stickerBtn = document.getElementById("stickerBtn");
    const stickerPicker = document.getElementById("stickerPicker");
    const closeStickerBtn = document.getElementById("closeStickerBtn");
    const stickerGrid = document.getElementById("stickerGrid");

    // 保存データのロード
    const savedName = localStorage.getItem("line_saved_name") || "";
    if (savedName) nicknameInput.value = savedName;

    const savedAvatar = localStorage.getItem("line_saved_avatar") || "🐻";
    if (AVATARS.includes(savedAvatar)) selectedAvatar = savedAvatar;

    // アバターグリッド構築
    function renderAvatarGrid() {
      avatarGrid.innerHTML = "";
      AVATARS.forEach(av => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `w-10 h-10 rounded-full text-xl flex items-center justify-center border-2 transition-all hover:scale-110 active:scale-95 ${av === selectedAvatar ? 'border-line-brand bg-emerald-50 dark:bg-emerald-950/20' : 'border-zinc-200 dark:border-zinc-800'}`;
        btn.innerText = av;
        btn.addEventListener("click", () => {
          selectedAvatar = av;
          renderAvatarGrid();
        });
        avatarGrid.appendChild(btn);
      });
    }
    renderAvatarGrid();

    // スタンプグリッド構築
    const STICKERS_LIST = [
      { id: "bear_ok", emoji: "🐻", label: "OK!" },
      { id: "bunny_love", emoji: "🐰", label: "ありがとう" },
      { id: "chick_congrats", emoji: "🐥", label: "おめでとう" },
      { id: "cat_angry", emoji: "🐱", label: "おこ！" },
      { id: "panda_cry", emoji: "🐼", label: "えーん" },
      { id: "frog_shock", emoji: "🐸", label: "ガーン！" },
      { id: "koala_sleep", emoji: "🐨", label: "おやすみ" },
      { id: "lion_gogogo", emoji: "🦁", label: "ファイト！" },
      { id: "monkey_sorry", emoji: "🐵", label: "ごめんね" },
      { id: "fox_sparkle", emoji: "🦊", label: "お疲れさま" }
    ];

    function renderStickerGrid() {
      stickerGrid.innerHTML = "";
      STICKERS_LIST.forEach(st => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "flex flex-col items-center justify-center p-2 rounded-xl border border-transparent hover:border-zinc-200 dark:hover:border-zinc-700 hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-all active:scale-95";
        btn.title = st.label;
        btn.innerHTML = '<span class="text-3xl leading-none mb-1 select-none">' + st.emoji + '</span><span class="text-[8px] font-bold text-zinc-500 dark:text-zinc-400 truncate w-full text-center leading-none">' + st.label + '</span>';
        btn.addEventListener("click", () => {
          sendSticker(st.id);
        });
        stickerGrid.appendChild(btn);
      });
    }
    renderStickerGrid();

    stickerBtn.addEventListener("click", () => {
      const isHidden = stickerPicker.classList.contains("hidden");
      if (isHidden) {
        stickerPicker.classList.remove("hidden");
        setTimeout(() => {
          stickerPicker.classList.remove("scale-95", "opacity-0");
        }, 10);
      } else {
        hideStickerPicker();
      }
    });

    closeStickerBtn.addEventListener("click", hideStickerPicker);

    function hideStickerPicker() {
      stickerPicker.classList.add("scale-95", "opacity-0");
      setTimeout(() => {
        stickerPicker.classList.add("hidden");
      }, 200);
    }

    function sendSticker(stickerId) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({
        type: "message",
        stickerId: stickerId
      }));
      hideStickerPicker();
    }

    // ダークモード・テーマの復元
    const isDarkSaved = localStorage.getItem("line_dark_theme") === "true";
    if (isDarkSaved) {
      document.documentElement.classList.add("dark");
    }

    themeToggleBtn.addEventListener("click", () => {
      const isDark = document.documentElement.classList.toggle("dark");
      localStorage.setItem("line_dark_theme", isDark ? "true" : "false");
    });

    // 接続の切断
    backBtn.addEventListener("click", () => {
      if (ws) {
        ws.close();
      }
      chatView.classList.add("hidden");
      backBtn.classList.add("hidden");
      const quickRoomArea = document.getElementById("quickRoomArea");
      if (quickRoomArea) {
        quickRoomArea.classList.add("hidden");
      }
      setupView.classList.remove("hidden");
      headerTitle.innerText = "LINE Talk";
      onlineCount.innerText = "";
    });

    // クイック別の部屋へ移動（お持ち帰り用）
    const quickRoomArea = document.getElementById("quickRoomArea");
    const quickRoomInput = document.getElementById("quickRoomInput");
    const quickRoomGoBtn = document.getElementById("quickRoomGoBtn");

    if (quickRoomGoBtn && quickRoomInput) {
      quickRoomGoBtn.addEventListener("click", () => {
        const val = quickRoomInput.value.trim().replace(/\s+/g, "");
        if (!val) {
          alert("移動先の部屋IDを入力してください。");
          return;
        }
        ROOM_ID = val;
        
        const headerRoomId = document.getElementById("headerRoomId");
        if (headerRoomId) {
          headerRoomId.innerText = ROOM_ID;
        }
        
        const roomInput = document.getElementById("roomInput");
        if (roomInput) {
          roomInput.value = ROOM_ID;
        }

        quickRoomInput.value = "";
        
        // WebSocketを切断・再接続
        if (ws) {
          ws.close();
        }
        connectWebSocket();
      });

      quickRoomInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          quickRoomGoBtn.click();
        }
      });
    }

    // テキストエリア自動伸縮とEnter送信
    messageInput.addEventListener("input", function() {
      this.style.height = "auto";
      this.style.height = (this.scrollHeight) + "px";
    });

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    // 参加処理
    joinBtn.addEventListener("click", () => {
      const roomInputVal = document.getElementById("roomInput").value.trim().replace(/\s+/g, "");
      if (!roomInputVal) {
        alert("部屋IDを入力してください。");
        return;
      }
      ROOM_ID = roomInputVal;

      myName = nicknameInput.value.trim();
      if (!myName) {
        alert("お名前（ニックネーム）を入力してください。");
        return;
      }
      localStorage.setItem("line_saved_name", myName);
      localStorage.setItem("line_saved_avatar", selectedAvatar);

      const headerRoomId = document.getElementById("headerRoomId");
      if (headerRoomId) {
        headerRoomId.innerText = ROOM_ID;
      }

      connectWebSocket();
    });

    // WebSocket接続
    function connectWebSocket() {
      updateConnectionStatus(false, "接続中...");
      
      if (ws) {
        ws.close();
      }

      ws = new WebSocket(WS_SERVER);

      ws.onopen = () => {
        updateConnectionStatus(true, "接続済み");
        
        // 部屋に参加
        ws.send(JSON.stringify({
          type: "join",
          roomId: ROOM_ID,
          userName: myName,
          avatar: selectedAvatar
        }));

        setupView.classList.add("hidden");
        chatView.classList.remove("hidden");
        backBtn.classList.remove("hidden");
        const quickRoomArea = document.getElementById("quickRoomArea");
        if (quickRoomArea) {
          quickRoomArea.classList.remove("hidden");
        }
        headerTitle.innerText = "トークルーム";
        resetJoinButton();
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          
          if (data.type === "presence") {
            onlineCount.innerText = " (オンライン: " + data.count + "人)";
            return;
          }

          if (data.type === "history") {
            messagesContainer.innerHTML = "";
            data.messages.forEach(msg => {
              appendMessage(msg);
            });
            scrollToBottom();
            return;
          }

          if (data.type === "message") {
            appendMessage(data);
            scrollToBottom();
          }
        } catch (e) {
          console.error(e);
        }
      };

      ws.onclose = () => {
        updateConnectionStatus(false, "オフライン");
      };

      ws.onerror = (err) => {
        console.error(err);
        updateConnectionStatus(false, "エラー（再試行中）");
      };
    }

    function updateConnectionStatus(connected, text) {
      if (connected) {
        connectionDot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse";
      } else {
        connectionDot.className = "w-2.5 h-2.5 rounded-full bg-rose-500 animate-pulse";
      }
    }

    function resetJoinButton() {
      joinBtn.disabled = false;
      joinBtn.innerText = "トークルームに入る";
    }

    // メッセージの送信
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      ws.send(JSON.stringify({
        type: "message",
        text: text
      }));

      messageInput.value = "";
      messageInput.style.height = "auto";
    }

    // メッセージ追加
    function appendMessage(msg) {
      const isMe = msg.userName === myName && msg.avatar === selectedAvatar;
      const dateStr = msg.timestamp ? formatTime(msg.timestamp) : formatTime(new Date().toISOString());

      const msgDiv = document.createElement("div");
      msgDiv.className = `flex gap-2.5 max-w-[85%] ${isMe ? 'ml-auto flex-row-reverse' : 'mr-auto'}`;

      // アバター表示
      const avatarDiv = document.createElement("div");
      avatarDiv.className = "w-9 h-9 rounded-full bg-white dark:bg-zinc-800 border border-zinc-200/50 dark:border-zinc-700/50 flex items-center justify-center text-lg select-none shadow-sm flex-shrink-0";
      avatarDiv.innerText = msg.avatar || "👤";

      const contentCol = document.createElement("div");
      contentCol.className = "flex flex-col gap-1";

      // ユーザー名
      if (!isMe) {
        const nameSpan = document.createElement("span");
        nameSpan.className = "text-[11px] font-extrabold text-zinc-600 dark:text-zinc-400 pl-1";
        nameSpan.innerText = msg.userName;
        contentCol.appendChild(nameSpan);
      }

      // バブル本体
      const bubbleWrapper = document.createElement("div");
      bubbleWrapper.className = "flex items-end gap-1.5";
      if (isMe) bubbleWrapper.className += " flex-row-reverse";

      const bubble = document.createElement("div");
      
      // スタンプメッセージか通常のメッセージかで出し分け
      if (msg.stickerId) {
        bubble.className = "relative p-1 max-w-sm rounded-2xl select-none";
        const stickerMeta = STICKERS_LIST.find(s => s.id === msg.stickerId);
        if (stickerMeta) {
          bubble.innerHTML = '<div class="flex flex-col items-center"><span class="text-7xl leading-none py-2">' + stickerMeta.emoji + '</span><span class="text-[10px] font-bold text-zinc-500/80 dark:text-zinc-400 bg-white/80 dark:bg-zinc-800/80 border border-zinc-200/30 dark:border-zinc-700/30 px-2.5 py-0.5 rounded-full shadow-sm">' + stickerMeta.label + '</span></div>';
        } else {
          bubble.innerHTML = '<span class="text-3xl">🐻</span>';
        }
      } else if (msg.fileUrl) {
        // 画像かその他ファイルか
        const isImg = msg.fileUrl.match(/\.(jpeg|jpg|gif|png|webp)/i);
        if (isImg) {
          bubble.className = "relative rounded-2xl overflow-hidden max-w-xs border border-zinc-200 dark:border-zinc-800 shadow-md bg-white dark:bg-zinc-900";
          bubble.innerHTML = '<a href="' + msg.fileUrl + '" target="_blank"><img src="' + msg.fileUrl + '" class="max-w-full h-auto object-cover max-h-60 hover:opacity-95 transition-opacity" /></a>';
        } else {
          bubble.className = "relative p-3.5 rounded-2xl max-w-sm text-sm font-semibold shadow-sm bubble-other-tail flex items-center gap-2 bg-white dark:bg-zinc-900 text-zinc-800 dark:text-zinc-200";
          bubble.innerHTML = '📁 <a href="' + msg.fileUrl + '" target="_blank" class="underline text-indigo-500 hover:text-indigo-600 truncate max-w-[180px] font-bold">' + (msg.text || "添付ファイル") + '</a>';
        }
      } else {
        // 通常のテキスト
        if (isMe) {
          bubble.className = "relative p-3 rounded-2xl max-w-sm text-sm font-semibold shadow-sm text-zinc-900 dark:text-white bg-line-brand dark:bg-line-brandHover text-white bubble-me-tail";
        } else {
          bubble.className = "relative p-3 rounded-2xl max-w-sm text-sm font-semibold shadow-sm text-zinc-800 dark:text-zinc-100 bg-white dark:bg-zinc-800 bubble-other-tail";
        }
        bubble.innerText = msg.text;
      }

      const timeSpan = document.createElement("span");
      timeSpan.className = "text-[9px] text-zinc-500/80 dark:text-zinc-400 font-bold tracking-tight mb-0.5 select-none";
      timeSpan.innerText = dateStr;

      bubbleWrapper.appendChild(bubble);
      bubbleWrapper.appendChild(timeSpan);
      contentCol.appendChild(bubbleWrapper);

      msgDiv.appendChild(avatarDiv);
      msgDiv.appendChild(contentCol);

      messagesContainer.appendChild(msgDiv);
    }

    function formatTime(isoStr) {
      try {
        const d = new Date(isoStr);
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      } catch (e) {
        return "";
      }
    }

    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // ドラッグ＆ドロップファイル送信対応
    window.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropOverlay.classList.remove("opacity-0", "pointer-events-none");
    });

    dropOverlay.addEventListener("dragleave", () => {
      dropOverlay.classList.add("opacity-0", "pointer-events-none");
    });

    window.addEventListener("drop", (e) => {
      e.preventDefault();
      dropOverlay.classList.add("opacity-0", "pointer-events-none");
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        uploadFile(files[0]);
      }
    });

    fileBtn.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", (e) => {
      const files = e.target.files;
      if (files.length > 0) {
        uploadFile(files[0]);
      }
    });

    // ファイルアップロード擬似処理（お持ち帰り版はBASE64埋め込みで本番サーバーへ直接送信）
    function uploadFile(file) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;

      const reader = new FileReader();
      uploadingIndicator.classList.remove("hidden");

      reader.onload = function(event) {
        const base64Data = event.target.result;
        
        // サーバーへファイルデータ（BASE64）を送信
        ws.send(JSON.stringify({
          type: "file",
          fileName: file.name,
          fileData: base64Data
        }));

        uploadingIndicator.classList.add("hidden");
      };

      reader.onerror = function() {
        alert("ファイルの読み込みに失敗しました。");
        uploadingIndicator.classList.add("hidden");
      };

      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
