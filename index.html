<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE Talk - 部屋: USER_ROOM_ID</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            line: {
              brand: '#06C755',
              brandHover: '#05B04B',
              bg: '#8CABD9',
              bgDark: '#1A202C',
              bubbleMe: '#8FE25F',
              bubbleMeDark: '#2D8A4E',
              bubbleOther: '#FFFFFF',
              bubbleOtherDark: '#2D3748'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* LINE風 吹き出しのしっぽ */
    .bubble-me-tail {
      position: relative;
    }
    .bubble-me-tail::after {
      content: '';
      position: absolute;
      top: 10px;
      right: -6px;
      width: 10px;
      height: 10px;
      background-color: #8FE25F;
      transform: rotate(45deg);
      border-top-right-radius: 2px;
      z-index: 0;
    }
    .dark .bubble-me-tail::after {
      background-color: #2D8A4E;
    }
    .bubble-other-tail {
      position: relative;
    }
    .bubble-other-tail::after {
      content: '';
      position: absolute;
      top: 10px;
      left: -6px;
      width: 10px;
      height: 10px;
      background-color: #FFFFFF;
      transform: rotate(45deg);
      border-bottom-left-radius: 2px;
      z-index: 0;
    }
    .dark .bubble-other-tail::after {
      background-color: #2D3748;
    }
    /* スクロールバー非表示 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* トークエリアのスクロール */
    #messagesContainer::-webkit-scrollbar {
      width: 6px;
    }
    #messagesContainer::-webkit-scrollbar-track {
      background: transparent;
    }
    #messagesContainer::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-line-bg dark:bg-line-bgDark text-zinc-900 dark:text-zinc-100 font-sans min-h-screen flex flex-col transition-colors duration-200">
  
  <!-- 1. HEADER (LINE Talk トークヘッダー) -->
  <header class="bg-[#1E2A3A]/90 dark:bg-zinc-950/95 backdrop-blur text-white px-4 py-3 sticky top-0 z-20 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <button id="backBtn" class="p-1 hover:bg-white/10 rounded-full transition-colors hidden" title="設定に戻る">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <div>
        <div class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse" id="connectionDot"></span>
          <h1 class="font-bold text-base tracking-wide" id="headerTitle">LINE Talk</h1>
        </div>
        <p class="text-[10px] text-zinc-300 font-medium">部屋ID: <span class="font-mono font-bold bg-white/10 px-1 py-0.5 rounded" id="roomDisplay">USER_ROOM_ID</span> <span id="onlineCount" class="ml-1 opacity-90"></span></p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeToggleBtn" class="p-2 hover:bg-white/10 rounded-xl transition-all text-sm" title="テーマ変更">
        🌓
      </button>
    </div>
  </header>

  <!-- 2. LOGIN / SETUP VIEW (LINEのプロフィール設定を模した画面) -->
  <main id="setupView" class="flex-1 flex flex-col justify-center items-center p-4">
    <div class="bg-white dark:bg-zinc-900 border border-zinc-200/50 dark:border-zinc-800/50 rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl text-center space-y-6">
      
      <!-- LINE公式風吹き出しロゴ -->
      <div class="flex flex-col items-center">
        <div class="w-16 h-16 bg-line-brand text-white font-extrabold rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-emerald-100 dark:shadow-none animate-bounce">
          💬
        </div>
        <h2 class="text-xl font-extrabold mt-4 text-zinc-800 dark:text-zinc-100">LINE Talk お持ち帰り版</h2>
        <p class="text-[11px] text-zinc-400 mt-1 max-w-xs leading-relaxed">このHTMLファイルをダブルクリックするだけで、現在進行中のトークルームにいつでも安全にアクセスできます。</p>
      </div>

      <!-- アバター選択 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">プロフィール画像 (LINEキャラクター風)</label>
        <div class="grid grid-cols-6 gap-2" id="avatarGrid">
          <!-- JSでレンダリング -->
        </div>
      </div>

      <!-- ニックネーム入力 -->
      <div class="space-y-2 text-left">
        <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-wider block">表示するお名前</label>
        <input type="text" id="nicknameInput" maxlength="15" class="w-full py-3 px-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl focus:ring-2 focus:ring-line-brand/50 focus:border-line-brand focus:outline-none font-bold text-sm text-zinc-800 dark:text-zinc-100" placeholder="ニックネームを入力してください">
      </div>

      <!-- 参加ボタン -->
      <button id="joinBtn" class="w-full py-3.5 bg-line-brand hover:bg-line-brandHover text-white font-bold rounded-xl active:scale-[0.98] transition-all text-sm shadow-md shadow-emerald-100 dark:shadow-none">
        トークを開始する
      </button>
    </div>
  </main>

  <!-- 3. CHAT VIEW (LINEそっくりのトーク画面) -->
  <main id="chatView" class="hidden flex-1 flex flex-col overflow-hidden max-w-2xl w-full mx-auto relative">
    
    <!-- ドラッグ＆ドロップ用オーバーレイ -->
    <div id="dropOverlay" class="absolute inset-0 bg-line-brand/20 dark:bg-line-brand/10 backdrop-blur-sm border-4 border-dashed border-line-brand m-2 rounded-2xl z-50 flex flex-col items-center justify-center pointer-events-none hidden opacity-0 transition-opacity duration-200">
      <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-xl flex flex-col items-center gap-3">
        <span class="text-4xl animate-bounce">📁</span>
        <p class="font-extrabold text-zinc-800 dark:text-zinc-100 text-sm">ここにファイルをドロップして送信</p>
        <p class="text-[10px] text-zinc-400">画像・動画・PDFなどをすばやく共有できます</p>
      </div>
    </div>

    <!-- トークメッセージリスト -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-4 min-h-0">
      <!-- メッセージがここに描画されます -->
    </div>

    <!-- 送信中・アップロード中ステータス -->
    <div id="uploadingIndicator" class="px-4 py-2 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-sm border-t border-zinc-100 dark:border-zinc-800 flex items-center gap-2 text-xs text-zinc-500 hidden">
      <div class="w-3.5 h-3.5 border-2 border-line-brand border-t-transparent rounded-full animate-spin"></div>
      <span>ファイルをアップロード中...</span>
    </div>

    <!-- LINE風フッター入力エリア -->
    <footer class="bg-white dark:bg-zinc-950 border-t border-zinc-200 dark:border-zinc-900 p-2 md:p-3 flex items-end gap-2 sticky bottom-0 z-10">
      
      <!-- ファイル添付ボタン -->
      <button id="fileBtn" class="p-2.5 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 hover:text-line-brand transition-colors flex-shrink-0" title="画像・ファイルを送信">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      </button>
      <input type="file" id="fileInput" class="hidden" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">

      <!-- テキスト入力 -->
      <div class="flex-1 bg-zinc-100 dark:bg-zinc-900 rounded-2xl px-3 py-2 border border-zinc-200/50 dark:border-zinc-800/50 focus-within:ring-2 focus-within:ring-line-brand/30 transition-shadow">
        <textarea id="messageInput" rows="1" class="w-full bg-transparent text-sm focus:outline-none resize-none max-h-24 text-zinc-800 dark:text-zinc-100 placeholder-zinc-400 leading-normal" placeholder="メッセージを入力..."></textarea>
      </div>

      <!-- 送信ボタン -->
      <button id="sendBtn" class="p-2.5 bg-line-brand hover:bg-line-brandHover text-white rounded-xl active:scale-95 transition-all flex items-center justify-center shadow-sm flex-shrink-0" title="送信">
        <svg class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
      </button>
    </footer>
  </main>

  <script>
    // 💡自動的に親アプリと同じURL・同じ部屋番号がここにセットされます
    const ROOM_ID = window.location.hash ? window.location.hash.substring(1) : "YOUR_ROOM_ID";
    const WS_SERVER = (window.location.protocol === "https:" ? "wss:" : "ws:") + "//" + window.location.host;
    
    document.getElementById("roomDisplay").innerText = ROOM_ID;

    let ws = null;
    let myName = "";
    let myId = "";
    let selectedAvatar = "🐻"; // デフォルト
    
    // LINE風キャラクターアバター定義
    const avatars = ["🐻", "🐰", "🐥", "🐸", "🐱", "🐼", "🦁", "🐵", "🦊", "🐨", "🐧", "🦄"];

    const setupView = document.getElementById("setupView");
    const chatView = document.getElementById("chatView");
    const nicknameInput = document.getElementById("nicknameInput");
    const joinBtn = document.getElementById("joinBtn");
    const backBtn = document.getElementById("backBtn");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const messagesContainer = document.getElementById("messagesContainer");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const connectionDot = document.getElementById("connectionDot");
    const headerTitle = document.getElementById("headerTitle");
    const onlineCount = document.getElementById("onlineCount");
    const avatarGrid = document.getElementById("avatarGrid");
    
    const fileBtn = document.getElementById("fileBtn");
    const fileInput = document.getElementById("fileInput");
    const uploadingIndicator = document.getElementById("uploadingIndicator");
    const dropOverlay = document.getElementById("dropOverlay");

    // 保存データのロード
    const savedName = localStorage.getItem("line_saved_name") || "";
    const savedAvatar = localStorage.getItem("line_saved_avatar") || "🐻";
    if (savedName) nicknameInput.value = savedName;
    selectedAvatar = savedAvatar;

    // アバターグリッド構築
    function renderAvatarGrid() {
      avatarGrid.innerHTML = "";
      avatars.forEach(av => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "aspect-square text-2xl flex items-center justify-center bg-zinc-50 dark:bg-zinc-800 hover:bg-zinc-100 border-2 rounded-xl transition-all " + 
          (av === selectedAvatar ? "border-line-brand bg-emerald-50/50 dark:bg-emerald-950/20 scale-105" : "border-transparent");
        btn.innerText = av;
        btn.addEventListener("click", () => {
          selectedAvatar = av;
          renderAvatarGrid();
        });
        avatarGrid.appendChild(btn);
      });
    }
    renderAvatarGrid();

    // ダークモード・テーマの復元
    const isDarkSaved = localStorage.getItem("line_dark_theme") === "true";
    if (isDarkSaved) {
      document.documentElement.classList.add("dark");
    }

    themeToggleBtn.addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
      localStorage.setItem("line_dark_theme", document.documentElement.classList.contains("dark"));
    });

    joinBtn.addEventListener("click", () => {
      myName = nicknameInput.value.trim();
      if (!myName) {
        alert("お名前（ニックネーム）を入力してください。");
        return;
      }
      localStorage.setItem("line_saved_name", myName);
      localStorage.setItem("line_saved_avatar", selectedAvatar);
      connectWebSocket();
    });

    backBtn.addEventListener("click", () => {
      if (ws) {
        ws.close();
      }
      chatView.classList.add("hidden");
      backBtn.classList.add("hidden");
      setupView.classList.remove("hidden");
      headerTitle.innerText = "LINE Talk";
      onlineCount.innerText = "";
    });

    // テキストエリア自動伸縮とEnter送信
    messageInput.addEventListener("input", function() {
      this.style.height = "auto";
      this.style.height = (this.scrollHeight) + "px";
    });

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !ws) return;

      ws.send(JSON.stringify({
        type: "message",
        text: text
      }));
      messageInput.value = "";
      messageInput.style.height = "auto";
    }

    // ファイル送信 (Base64)
    fileBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      if (e.target.files && e.target.files[0]) {
        uploadFile(e.target.files[0]);
      }
    });

    function uploadFile(file) {
      if (!ws) return;
      uploadingIndicator.classList.remove("hidden");
      const reader = new FileReader();
      
      let fileType = "file";
      if (file.type.startsWith("image/")) fileType = "image";
      else if (file.type.startsWith("video/")) fileType = "video";

      reader.onload = (e) => {
        ws.send(JSON.stringify({
          type: "message",
          text: "",
          fileData: e.target.result,
          fileName: file.name,
          fileType: fileType
        }));
        uploadingIndicator.classList.add("hidden");
        fileInput.value = "";
      };
      reader.onerror = () => {
        alert("ファイルの読み込みに失敗しました。");
        uploadingIndicator.classList.add("hidden");
      };
      reader.readAsDataURL(file);
    }

    // ドラッグ＆ドロップ
    window.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropOverlay.classList.remove("hidden");
      setTimeout(() => dropOverlay.classList.remove("opacity-0"), 10);
    });

    window.addEventListener("dragleave", (e) => {
      e.preventDefault();
      if (e.relatedTarget === null) {
        dropOverlay.classList.add("opacity-0");
        setTimeout(() => dropOverlay.classList.add("hidden"), 200);
      }
    });

    window.addEventListener("drop", (e) => {
      e.preventDefault();
      dropOverlay.classList.add("opacity-0");
      setTimeout(() => dropOverlay.classList.add("hidden"), 200);

      if (e.dataTransfer.files && e.dataTransfer.files[0]) {
        uploadFile(e.dataTransfer.files[0]);
      }
    });

    // WebSocket 接続
    function connectWebSocket() {
      connectionDot.classList.remove("bg-emerald-500");
      connectionDot.classList.add("bg-amber-500");
      
      ws = new WebSocket(WS_SERVER);

      ws.onopen = () => {
        connectionDot.classList.remove("bg-amber-500");
        connectionDot.classList.add("bg-emerald-500");
        
        ws.send(JSON.stringify({
          type: "join",
          roomId: ROOM_ID,
          userName: myName,
          avatar: selectedAvatar
        }));
        
        setupView.classList.add("hidden");
        chatView.classList.remove("hidden");
        backBtn.classList.remove("hidden");
        headerTitle.innerText = "トークルーム";
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          
          if (data.type === "init") {
            myId = data.userId;
            messagesContainer.innerHTML = "";
            updateUserCount(data.users.length);
            data.messages.forEach(msg => {
              appendMessage(msg);
            });
          } else if (data.type === "message") {
            appendMessage(data.message);
          } else if (data.type === "user_joined") {
            appendSystemMessage("📢 " + data.user.avatar + " " + data.user.userName + "さんが参加しました");
            if (data.users) updateUserCount(data.users.length);
          } else if (data.type === "user_left") {
            appendSystemMessage("📢 ユーザーが退室しました");
            if (data.users) updateUserCount(data.users.length);
          }
        } catch(e) {
          console.error(e);
        }
      };

      ws.onclose = () => {
        connectionDot.classList.remove("bg-emerald-500");
        connectionDot.classList.add("bg-rose-500");
        appendSystemMessage("⚠️ 接続が切れました。再接続をお試しください。");
      };
    }

    function updateUserCount(count) {
      onlineCount.innerText = " (メンバー: " + count + "人)";
    }

    function appendMessage(msg) {
      if (msg.senderId === "system") {
        appendSystemMessage(msg.text);
        return;
      }

      const isMe = msg.senderId === myId;
      const msgDiv = document.createElement("div");
      msgDiv.className = "flex items-start gap-2 " + (isMe ? "flex-row-reverse" : "flex-row") + " animate-in fade-in duration-200";
      
      const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      
      let mediaContent = "";
      if (msg.fileData) {
        if (msg.fileType === "image") {
          mediaContent = `
            <div class="mt-1.5 overflow-hidden rounded-xl border border-zinc-200/50 dark:border-zinc-800/50 max-w-xs shadow-md">
              <img src="${msg.fileData}" alt="${msg.fileName}" class="max-h-60 object-cover w-full cursor-pointer hover:scale-[1.01] transition-transform" onclick="window.open(this.src)" referrerPolicy="no-referrer">
            </div>`;
        } else if (msg.fileType === "video") {
          mediaContent = `
            <div class="mt-1.5 overflow-hidden rounded-xl border border-zinc-200/50 dark:border-zinc-800/50 max-w-xs shadow-md">
              <video src="${msg.fileData}" controls class="max-h-60 w-full bg-black"></video>
            </div>`;
        } else {
          mediaContent = `
            <div class="mt-1.5 flex items-center gap-3 p-3 rounded-xl bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 max-w-xs">
              <span class="text-xl">📄</span>
              <div class="min-w-0 flex-1">
                <p class="text-xs font-semibold truncate text-zinc-700 dark:text-zinc-200">${msg.fileName}</p>
                <a href="${msg.fileData}" download="${msg.fileName}" class="text-[10px] text-emerald-600 dark:text-emerald-400 font-bold hover:underline mt-0.5 inline-block">ダウンロード</a>
              </div>
            </div>`;
        }
      }

      const messageText = msg.text ? `<p class="whitespace-pre-wrap leading-relaxed">${msg.text}</p>` : "";

      if (isMe) {
        msgDiv.innerHTML = `
          <!-- 既読と時間 -->
          <div class="flex flex-col justify-end items-end text-[9px] text-zinc-600 dark:text-zinc-400 font-bold self-end shrink-0 leading-tight">
            <span class="text-emerald-600 dark:text-emerald-400 font-extrabold select-none mb-0.5">既読</span>
            <span class="opacity-80">${time}</span>
          </div>

          <!-- 吹き出し -->
          <div class="bubble-me-tail max-w-[70%] z-10">
            <div class="px-3.5 py-2 rounded-2xl rounded-tr-none bg-line-bubbleMe dark:bg-line-bubbleMeDark text-zinc-900 dark:text-white text-sm break-words shadow-sm">
              ${messageText}
              ${mediaContent}
            </div>
          </div>
        `;
      } else {
        msgDiv.innerHTML = `
          <!-- アバター -->
          <div class="w-9 h-9 rounded-full bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 flex items-center justify-center text-xl shadow-sm shrink-0 select-none">
            ${msg.senderAvatar}
          </div>

          <div class="flex flex-col max-w-[70%] space-y-0.5">
            <!-- 相手の名前 -->
            <span class="text-[10px] font-bold text-zinc-700 dark:text-zinc-300 ml-1 font-mono">${msg.senderName}</span>
            
            <div class="flex items-end gap-1.5">
              <!-- 吹き出し -->
              <div class="bubble-other-tail z-10">
                <div class="px-3.5 py-2 rounded-2xl rounded-tl-none bg-line-bubbleOther dark:bg-line-bubbleOtherDark text-zinc-900 dark:text-zinc-100 text-sm break-words shadow-sm">
                  ${messageText}
                  ${mediaContent}
                </div>
              </div>

              <!-- 時間 -->
              <span class="text-[9px] text-zinc-600 dark:text-zinc-400 font-bold self-end shrink-0 leading-none select-none opacity-80">${time}</span>
            </div>
          </div>
        `;
      }
      
      messagesContainer.appendChild(msgDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function appendSystemMessage(text) {
      const msgDiv = document.createElement("div");
      msgDiv.className = "flex justify-center my-3 animate-in fade-in duration-200";
      msgDiv.innerHTML = `
        <span class="inline-flex items-center gap-1 px-4 py-1.5 bg-black/15 dark:bg-black/35 text-white rounded-full text-[10px] font-bold tracking-wide shadow-sm max-w-[85%] text-center">
          ${text}
        </span>
      `;
      messagesContainer.appendChild(msgDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
  </script>
</body>
</html>
